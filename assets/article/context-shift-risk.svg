<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="760" fill="#ffffff"/>
  <rect x="64" y="64" width="1072" height="632" rx="28" fill="#FBFBFA" stroke="#E5E0D8"/>

  <text x="112" y="146" fill="#1D232B" font-family="Karla, Arial, sans-serif" font-size="42" font-weight="700">Same case facts, different background, different model behavior</text>
  <text x="112" y="186" fill="#66707D" font-family="Karla, Arial, sans-serif" font-size="22">A useful reminder that clinical risk can appear even when the medical facts stay constant.</text>

  <g>
    <rect x="112" y="260" width="438" height="250" rx="24" fill="#ffffff" stroke="#E5E0D8"/>
    <text x="146" y="312" fill="#66707D" font-family="IBM Plex Mono, monospace" font-size="18" letter-spacing="2">CASE FACTS</text>
    <text x="146" y="368" fill="#1D232B" font-family="Karla, Arial, sans-serif" font-size="26">Chest pain, shortness of breath, nausea, identical clinical record.</text>
    <text x="146" y="446" fill="#5F7692" font-family="Instrument Serif, Georgia, serif" font-size="44">Medical facts held constant</text>
  </g>

  <g>
    <rect x="650" y="260" width="438" height="250" rx="24" fill="#ffffff" stroke="#E5E0D8"/>
    <text x="684" y="312" fill="#66707D" font-family="IBM Plex Mono, monospace" font-size="18" letter-spacing="2">CONTEXT VARIED</text>
    <text x="684" y="368" fill="#1D232B" font-family="Karla, Arial, sans-serif" font-size="26">Socioeconomic and demographic framing changed across otherwise identical cases.</text>
    <text x="684" y="446" fill="#E5634A" font-family="Instrument Serif, Georgia, serif" font-size="44">Recommendations still shifted</text>
  </g>

  <g>
    <line x1="550" y1="386" x2="650" y2="386" stroke="#AAB6C2" stroke-width="3" stroke-linecap="round"/>
    <path d="M632 370L650 386L632 402" stroke="#AAB6C2" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g>
    <text x="112" y="586" fill="#1D232B" font-family="IBM Plex Mono, monospace" font-size="18" letter-spacing="2">DECISIONS AFFECTED</text>
    <rect x="112" y="610" width="178" height="34" rx="17" fill="#F1EFEA"/>
    <rect x="308" y="610" width="212" height="34" rx="17" fill="#F1EFEA"/>
    <rect x="538" y="610" width="176" height="34" rx="17" fill="#F1EFEA"/>
    <rect x="732" y="610" width="266" height="34" rx="17" fill="#F1EFEA"/>
    <text x="201" y="632" text-anchor="middle" fill="#1D232B" font-family="Karla, Arial, sans-serif" font-size="18">Triage priority</text>
    <text x="414" y="632" text-anchor="middle" fill="#1D232B" font-family="Karla, Arial, sans-serif" font-size="18">Diagnostic testing</text>
    <text x="626" y="632" text-anchor="middle" fill="#1D232B" font-family="Karla, Arial, sans-serif" font-size="18">Treatment</text>
    <text x="865" y="632" text-anchor="middle" fill="#1D232B" font-family="Karla, Arial, sans-serif" font-size="18">Mental health evaluation</text>
  </g>
</svg>
