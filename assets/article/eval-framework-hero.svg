<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="800" viewBox="0 0 1400 800" fill="none">
  <rect width="1400" height="800" rx="36" fill="#F6F2EA"/>
  <circle cx="1110" cy="130" r="170" fill="#E7EEF7"/>
  <circle cx="220" cy="650" r="150" fill="#F0E4CF"/>
  <text x="90" y="110" fill="#18263A" font-family="Georgia, serif" font-size="52" font-weight="700">A multi-metric way to evaluate</text>
  <text x="90" y="170" fill="#18263A" font-family="Georgia, serif" font-size="52" font-weight="700">short generated text</text>
  <text x="90" y="235" fill="#5E6D7C" font-family="Helvetica, Arial, sans-serif" font-size="26">The point is not to find one score. It is to understand where quality,</text>
  <text x="90" y="270" fill="#5E6D7C" font-family="Helvetica, Arial, sans-serif" font-size="26">variation, and human judgment agree or diverge.</text>

  <rect x="80" y="340" width="390" height="230" rx="28" fill="#FFFFFF" stroke="#D7DDE5" stroke-width="2"/>
  <text x="120" y="392" fill="#2D4768" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700">1. Reference-based evaluation</text>
  <text x="120" y="442" fill="#25364A" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700">What does the reply share</text>
  <text x="120" y="477" fill="#25364A" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700">with the target?</text>
  <text x="120" y="529" fill="#6A7889" font-family="Helvetica, Arial, sans-serif" font-size="22">ROUGE, BERTScore, STS</text>

  <rect x="500" y="340" width="400" height="230" rx="28" fill="#FFFFFF" stroke="#D7DDE5" stroke-width="2"/>
  <text x="530" y="392" fill="#2D4768" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700">2. Candidate-to-candidate</text>
  <text x="530" y="418" fill="#2D4768" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700">checks</text>
  <text x="530" y="462" fill="#25364A" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700">Are the suggestions useful</text>
  <text x="530" y="497" fill="#25364A" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700">or just repetitive?</text>
  <text x="530" y="529" fill="#6A7889" font-family="Helvetica, Arial, sans-serif" font-size="22">consistency, diversity,</text>
  <text x="530" y="557" fill="#6A7889" font-family="Helvetica, Arial, sans-serif" font-size="22">semantic spread</text>

  <rect x="930" y="340" width="390" height="230" rx="28" fill="#FFFFFF" stroke="#D7DDE5" stroke-width="2"/>
  <text x="960" y="392" fill="#2D4768" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700">3. Human-aligned evaluation</text>
  <text x="960" y="462" fill="#25364A" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700">Which metrics move most</text>
  <text x="960" y="497" fill="#25364A" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700">like human judgment?</text>
  <text x="960" y="529" fill="#6A7889" font-family="Helvetica, Arial, sans-serif" font-size="22">LLM judge +</text>
  <text x="960" y="557" fill="#6A7889" font-family="Helvetica, Arial, sans-serif" font-size="22">Pearson correlation</text>

  <path d="M470 452H485" stroke="#7E91A8" stroke-width="4" stroke-linecap="round"/>
  <path d="M900 452H915" stroke="#7E91A8" stroke-width="4" stroke-linecap="round"/>
  <path d="M477 443L495 452L477 461" stroke="#7E91A8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M907 443L925 452L907 461" stroke="#7E91A8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="90" y="616" width="1220" height="102" rx="24" fill="#1F3552"/>
  <text x="130" y="677" fill="#F8F2E7" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="700">The best metric is not the easiest one to compute.</text>
  <text x="130" y="714" fill="#D9E4F0" font-family="Helvetica, Arial, sans-serif" font-size="24">It is the one that reflects the kind of quality your product actually needs.</text>
</svg>
